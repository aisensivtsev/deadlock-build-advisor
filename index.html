<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deadlock Item Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="nav">
  <span style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:20px;letter-spacing:.1em;color:#f59e0b;text-transform:uppercase">◆ Deadlock Advisor</span>
  <div style="flex:1"></div>
  <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#2a3245;letter-spacing:.08em">OFFLINE · NO API KEY</span>
</div>

<div style="max-width:1060px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:18px">

  <div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;flex-wrap:wrap">
    <div class="card">
      <span class="label">Your Hero</span>
      <div id="my-hero-display">
        <button class="btn btn-p" onclick="openHP('self')" style="width:100%;text-align:left;padding:10px 14px">+ Select your hero</button>
      </div>
    </div>
    <div class="card" style="min-width:200px">
      <span class="label">Game Phase</span>
      <div style="display:flex;gap:6px">
        <button class="btn" id="pe" onclick="setPhase('early')" style="flex:1;font-size:12px;padding:7px 4px">Early<div style="font-size:9px;font-family:'Share Tech Mono',monospace;margin-top:2px;font-weight:400">&lt;3k</div></button>
        <button class="btn" id="pm" onclick="setPhase('mid')"   style="flex:1;font-size:12px;padding:7px 4px">Mid<div style="font-size:9px;font-family:'Share Tech Mono',monospace;margin-top:2px;font-weight:400">3–6k</div></button>
        <button class="btn" id="pl" onclick="setPhase('late')"  style="flex:1;font-size:12px;padding:7px 4px">Late<div style="font-size:9px;font-family:'Share Tech Mono',monospace;margin-top:2px;font-weight:400">6k+</div></button>
      </div>
    </div>
  </div>

  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;color:#e8eaf0">Enemy Team</div>
      <button class="btn" onclick="addEnemy()" id="addbtn" style="font-size:12px;padding:6px 12px">+ Add Enemy</button>
    </div>
    <div id="ec" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>

  <button class="btn btn-p" onclick="analyze()" style="width:100%;padding:14px;font-size:16px;letter-spacing:.08em;text-transform:uppercase;font-weight:700">◆ Analyze &amp; Get Recommendations</button>
  <div id="err" style="display:none;font-size:12px;font-family:'Share Tech Mono',monospace;color:#ef4444;padding:8px 14px;background:#ef44440a;border:1px solid #ef444422;border-radius:6px"></div>
  <div id="res" style="display:none;flex-direction:column;gap:14px"></div>
</div>

<div id="hm" class="mbg" style="display:none" onclick="cm('hm')">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:#e8eaf0">Select Hero</div>
    <input placeholder="Search…" oninput="fh(this.value)" id="hs"/>
    <div class="hgrid" id="hg"></div>
  </div>
</div>

<div id="im" class="mbg" style="display:none" onclick="cm('im')">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
      <div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:#e8eaf0">Enemy Items <span id="imfor" style="color:#6b7280;font-weight:500;font-size:15px"></span></div>
      <button class="btn btn-p" onclick="cm('im')" style="padding:6px 14px;font-size:13px">Done ✓</button>
    </div>
    <div class="ftabs">
      <button class="ft fa" id="fta" onclick="fi('all')">All</button>
      <button class="ft"    id="ftw" onclick="fi('weapon')">Weapon</button>
      <button class="ft"    id="ftv" onclick="fi('vitality')">Vitality</button>
      <button class="ft"    id="fts" onclick="fi('spirit')">Spirit</button>
    </div>
    <input placeholder="Search items…" oninput="fis(this.value)" id="isearch"/>
    <div class="igrid" id="ig"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
